# ============================================================
# ci.yml — Quality Gate
# Runs on every PR and push to main / develop.
# Uses Nx affected so only changed projects are processed.
# ============================================================

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NX_CLOUD_NO_TIMEOUTS: 'true'

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Lint — ESLint across affected projects
  # ──────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for Nx affected to compare commits

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Derive base and head SHAs for Nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Run lint on affected projects
        run: npx nx affected --target=lint --parallel=3

  # ──────────────────────────────────────────────
  # Job 2: Test — Jest across affected projects
  # ──────────────────────────────────────────────
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive base and head SHAs for Nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Run tests on affected projects
        run: npx nx affected --target=test --parallel=3 --coverage --passWithNoTests

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: coverage/
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 3: Build — Production build of affected projects
  # ──────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Derive base and head SHAs for Nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Build affected projects (production)
        run: npx nx affected --target=build --configuration=production --parallel=3

  # ──────────────────────────────────────────────
  # Status Check — single required check for branch protection
  # ──────────────────────────────────────────────
  ci-success:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI jobs passed."
