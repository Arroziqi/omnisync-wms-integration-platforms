# ============================================================
# docker-build.yml — Build & Push Docker Images to GHCR
# Triggered on push to main (post-merge only).
# Images are tagged :latest and :<short-sha>.
# ============================================================

name: Docker Build & Push

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # github.repository resolves to owner/repo-name automatically
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/omnisync-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/omnisync-web

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & Push — NestJS API image
  # ──────────────────────────────────────────────
  build-api:
    name: 🐳 Build API Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Job 2: Build & Push — Next.js Web image
  # ──────────────────────────────────────────────
  build-web:
    name: 🐳 Build Web Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Web image
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Status Check — consumed by staging-deploy.yml
  # ──────────────────────────────────────────────
  docker-success:
    name: ✅ Docker Build Passed
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    if: always()
    steps:
      - name: Check all docker jobs succeeded
        run: |
          if [[ "${{ needs.build-api.result }}" != "success" || \
                "${{ needs.build-web.result }}" != "success" ]]; then
            echo "One or more Docker build jobs failed."
            exit 1
          fi
          echo "All Docker builds succeeded."
