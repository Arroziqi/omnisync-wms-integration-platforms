# ==============================================================
# docker-compose.yml — OmniSync Local Development Stack
# ==============================================================
# Usage:
#   Full stack (built images):  docker-compose up --build
#   Stop:                       docker-compose down
#   Remove volumes:             docker-compose down -v
# ==============================================================

name: omnisync

services:
  # ──────────────────────────────────────────────
  # PostgreSQL 16 — Primary Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: omnisync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnisync}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnisync_secret}
      POSTGRES_DB: ${POSTGRES_DB:-omnisync_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omnisync} -d ${POSTGRES_DB:-omnisync_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - omnisync-network

  # ──────────────────────────────────────────────
  # Redis 7 — Queue System (BullMQ) & Cache
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: omnisync-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - omnisync-network

  # ──────────────────────────────────────────────
  # NestJS API Gateway
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      target: runner
    container_name: omnisync-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-omnisync}:${POSTGRES_PASSWORD:-omnisync_secret}@postgres:5432/${POSTGRES_DB:-omnisync_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-1d}
      TIKTOK_APP_KEY: ${TIKTOK_APP_KEY:-}
      TIKTOK_APP_SECRET: ${TIKTOK_APP_SECRET:-}
      SHOPEE_PARTNER_ID: ${SHOPEE_PARTNER_ID:-}
      SHOPEE_PARTNER_KEY: ${SHOPEE_PARTNER_KEY:-}
      LAZADA_APP_KEY: ${LAZADA_APP_KEY:-}
      LAZADA_APP_SECRET: ${LAZADA_APP_SECRET:-}
    ports:
      - "${API_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - omnisync-network

  # ──────────────────────────────────────────────
  # Next.js Admin Dashboard
  # ──────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: runner
    container_name: omnisync-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - omnisync-network

  # ──────────────────────────────────────────────
  # Nginx — Reverse Proxy
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: omnisync-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - omnisync-network

# ==============================================================
# Volumes
# ==============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ==============================================================
# Networks
# ==============================================================
networks:
  omnisync-network:
    driver: bridge
    name: omnisync-network
