# ==============================================================================
# nginx.prod.conf — Production HTTPS Configuration
# ==============================================================================
# Usage (override base config):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
#
# Prerequisites:
#   1. Place your TLS certificate and key in the ./certs/ directory:
#        ./certs/fullchain.pem   ← certificate + intermediate chain
#        ./certs/privkey.pem     ← private key
#
#   2. Let's Encrypt (recommended) via Certbot:
#        certbot certonly --standalone -d yourdomain.com
#        cp /etc/letsencrypt/live/yourdomain.com/fullchain.pem ./certs/
#        cp /etc/letsencrypt/live/yourdomain.com/privkey.pem   ./certs/
#
#   3. Self-signed (for staging only):
#        mkdir -p ./certs
#        openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#          -keyout ./certs/privkey.pem \
#          -out ./certs/fullchain.pem \
#          -subj "/CN=localhost"
# ==============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    client_max_body_size 10m;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml image/svg+xml;

    # ──────────────────────────────────────────────────────────────────────────
    # Rate limiting zones
    # ──────────────────────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=webhooks:10m rate=50r/s;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_conn conn_limit 100;

    # ──────────────────────────────────────────────────────────────────────────
    # TLS session cache — improves TLS handshake performance
    # ──────────────────────────────────────────────────────────────────────────
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Modern TLS only — no SSLv3, TLS 1.0, TLS 1.1
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

    # OCSP Stapling — improves TLS certificate validation speed
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ──────────────────────────────────────────────────────────────────────────
    # Global security headers
    # ──────────────────────────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # HSTS — 1 year, include subdomains, eligible for preload list
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ──────────────────────────────────────────────────────────────────────────
    # Upstreams
    # ──────────────────────────────────────────────────────────────────────────
    upstream api_upstream {
        server api:3000;
        keepalive 32;
    }

    upstream web_upstream {
        server web:3000;
        keepalive 32;
    }

    # ──────────────────────────────────────────────────────────────────────────
    # HTTP → HTTPS redirect (port 80)
    # ──────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow ACME challenge for Let's Encrypt cert renewals
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ──────────────────────────────────────────────────────────────────────────
    # HTTPS server (port 443)
    # ──────────────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Block common scanners and bad user agents
        if ($http_user_agent ~* (nikto|nmap|masscan|sqlmap|havij|acunetix)) {
            return 403;
        }

        # ── Auth endpoints
        location ~ ^/api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            limit_req_log_level warn;

            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
        }

        # ── Webhook endpoints
        location ~ ^/api/v1/webhooks/ {
            limit_req zone=webhooks burst=100 nodelay;

            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
        }

        # ── All other API routes
        location /api/ {
            limit_req zone=api burst=60 nodelay;

            proxy_pass http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 90s;
        }

        # ── Health check
        location /health {
            proxy_pass http://api_upstream/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        # ── Frontend
        location / {
            proxy_pass http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 90s;
        }

        # ── Static assets
        location /_next/static/ {
            proxy_pass http://web_upstream/_next/static/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }
}
